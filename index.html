<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="css/home.css">
  <title>Mark Dingwall</title>
</head>

<body>
  <canvas id="shaderBg"></canvas>
  <canvas id="fireflies"></canvas>
  <div class="page" id="page">
    <section class="quadrant q-top-left">
      <div class="quadrant-content bitbrush-demo-content">
        <h2>BitBrush</h2>
        <div id="demo-panel">
          <div class="demo-header">try it &mdash; paint some pixels</div>
          <div class="mini-canvas-wrap">
            <canvas id="mini-canvas"></canvas>
          </div>
          <div class="mini-palette" id="mini-palette"></div>
          <div class="mini-bank">
            <span class="bank-label">bank:</span>
            <div class="bank-bar-track"><div id="bank-fill"></div></div>
            <span class="bank-count"><span id="bank-count">25</span>/25</span>
          </div>
          <div class="ghost-label">other users are painting too</div>
        </div>
        <p style="margin-top:12px"><a href="https://github.com/Axionatic/bitbrush" target="_blank">GitHub</a></p>
      </div>
    </section>
    <section class="quadrant q-top-right">
      <div class="quadrant-content">
        <h1>Mark Dingwall</h1>
        <p>Swipe, scroll or arrows to explore</p>
        <p>
          <small>
            <a href="https://github.com/Axionatic/axionatic.github.io" target="_blank">Get this site's code</a>
          </small>
        </p>
      </div>
    </section>
    <section class="quadrant q-bottom-left">
      <div class="quadrant-content">
        <h2>Sketches</h2>
        <p>Creative coding experiments</p>
        <p><a href="sketches/">Browse the gallery</a></p>
      </div>
    </section>
    <section class="quadrant q-bottom-right">
      <div class="quadrant-content">
        <h2>Portfolio</h2>
        <p>Interactive presentation experiments</p>
        <p><a href="portfolio/">Explore the demos</a></p>
      </div>
    </section>
  </div>
  <script src="utils/math.js"></script>
  <script src="utils/color.js"></script>
  <script src="utils/easing.js"></script>
  <script src="utils/device.js"></script>
  <script src="background.js"></script>
  <script src="index.js"></script>
  <script src="fireflies.js"></script>
  <script src="bitbrush-mini.js"></script>
  <script src="marquee.js"></script>
</body>

</html>
